<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Arabesque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #fdf6e3;
      --color-text: #2c1a00;
      --color-text-muted: #7a5c28;
      --color-primary: #c0392b;
      --color-gold: #d4a84b;
      --color-gold-light: #f5e6b8;
      --font-display: "Scheherazade New", serif;
      --font-body: "Nunito", sans-serif;
      --shadow-lg: 0 16px 48px rgba(44,26,0,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      background: #ffffff;
      color: var(--color-text);
      height: 100dvh;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 25%, rgba(212,168,75,0.13) 0%, transparent 50%),
        radial-gradient(circle at 80% 75%, rgba(192,57,43,0.10) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* ── Rotating text banner ── */
    .top-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem 0.5rem;
      pointer-events: none;
    }
    .rotating-text {
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 2.5vw, 1.3rem);
      font-weight: 700;
      color: var(--color-gold);
      text-shadow: 0 2px 10px rgba(212,168,75,0.4);
      letter-spacing: 0.04em;
      text-align: center;
      position: relative;
      height: 2.2em;
      overflow: visible;
      width: 90vw;
      max-width: 600px;
    }
    .rotating-text span {
      position: absolute;
      left: 50%;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .rotating-text span.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .rotating-text span.exit-up {
      opacity: 0;
      transform: translateX(-50%) translateY(-16px);
    }

    /* ── Bottom banner ── */
    .bottom-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1rem 0.8rem;
      pointer-events: none;
    }
    .rotating-text-bottom {
      font-family: var(--font-display);
      font-size: clamp(0.9rem, 2.2vw, 1.2rem);
      font-weight: 700;
      color: var(--color-primary);
      text-shadow: 0 2px 10px rgba(192,57,43,0.3);
      letter-spacing: 0.04em;
      text-align: center;
      position: relative;
      height: 2.2em;
      overflow: visible;
      width: 90vw;
      max-width: 600px;
    }
    .rotating-text-bottom span {
      position: absolute;
      left: 50%;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .rotating-text-bottom span.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .rotating-text-bottom span.exit-up {
      opacity: 0;
      transform: translateX(-50%) translateY(-16px);
    }

    /* ── Slides ── */
    .slides-wrapper { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }
    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4.5rem 1.5rem 3.5rem;
      visibility: hidden; pointer-events: none; z-index: 1;
    }
    .slide.is-active { visibility: visible; pointer-events: all; }
    .slide.enter-from-right { animation: enterRight 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .slide.enter-from-left  { animation: enterLeft  0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .slide.exit-to-left     { animation: exitLeft   0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .slide.exit-to-right    { animation: exitRight  0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes enterRight { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes enterLeft  { from { transform: translateX(-100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes exitLeft   { from { transform: translateX(0); opacity:1; } to { transform: translateX(-100%); opacity:0; } }
    @keyframes exitRight  { from { transform: translateX(0); opacity:1; } to { transform: translateX(100%); opacity:0; } }

    /* ── Photo ── */
    .photo-card {
      position: relative;
      width: min(380px, 85vw);
      aspect-ratio: 1;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 4px solid var(--color-gold);
      margin-bottom: 1.4rem;
      background: var(--color-gold-light);
      flex-shrink: 0;
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-card::after {
      content: "✦";
      position: absolute; top: 10px; right: 14px;
      font-size: 1.3rem; color: var(--color-gold); z-index: 2;
      opacity: 0.8; filter: drop-shadow(0 0 6px gold);
    }

    /* ── Question text ── */
    .question-text {
      font-size: clamp(1rem, 2.5vw, 1.12rem);
      font-weight: 800;
      color: var(--color-text);
      text-align: center;
      line-height: 1.45;
      max-width: 36ch;
      margin-bottom: 1rem;
    }

    .feedback { display: none; }

    /* ── Answer buttons — no background ── */
    .answers-row {
      display: flex; gap: 1rem;
      width: min(420px, 92vw);
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
    }
    #btn-no {
      position: relative;
      z-index: 10;
      cursor: pointer !important;
      pointer-events: all !important;
      flex: none !important;
      transition: font-size 0.3s ease, padding 0.3s ease, border-color 0.2s ease, color 0.2s ease !important;
    }
    #btn-yes {
      flex: none !important;
      transition: font-size 0.3s ease, padding 0.3s ease, opacity 0.3s ease, border-color 0.2s ease, color 0.2s ease !important;
    }
    .answer-btn {
      flex: 1;
      background: none;
      border: 2.5px solid var(--color-gold);
      border-radius: 999px;
      padding: 1rem 1.6rem;
      font-family: var(--font-body);
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      font-weight: 700;
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      min-height: 52px;
      -webkit-tap-highlight-color: rgba(212,168,75,0.2);
    }
    .answer-btn:hover:not(:disabled) {
      border-color: var(--color-primary);
      color: var(--color-primary);
      transform: translateY(-3px);
    }
    .answer-btn:active:not(:disabled) { transform: translateY(-1px); }
    .answer-btn.correct { border-color: #00897b; color: #00897b; }
    .answer-btn.wrong   { border-color: var(--color-primary); color: var(--color-primary); opacity: 0.6; }
    .answer-btn:disabled { cursor: default; }

    /* ── Intro ── */
    .intro-title {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 7vw, 4rem);
      color: var(--color-primary);
      text-align: center; line-height: 1.15;
      text-shadow: 2px 3px 0 rgba(212,168,75,0.4);
      margin-bottom: 0.8rem;
    }
    .intro-sub {
      font-size: clamp(0.88rem, 2vw, 1rem);
      color: var(--color-text-muted);
      text-align: center; max-width: 34ch; line-height: 1.6;
      margin-bottom: 2rem;
    }
    .start-btn {
      background: none;
      border: 2.5px solid var(--color-gold);
      border-radius: 999px;
      padding: 1.1rem 3rem; color: var(--color-text);
      font-family: var(--font-body); font-size: 1.15rem; font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      min-height: 52px;
      -webkit-tap-highlight-color: rgba(212,168,75,0.2);
    }
    .start-btn:hover { border-color: var(--color-primary); color: var(--color-primary); transform: translateY(-3px); }
    .ornament {
      font-family: var(--font-display);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--color-gold); text-align: center;
      opacity: 0.55; margin-top: 1.4rem; letter-spacing: 0.2em;
    }

    /* ── Score ── */
    .score-ring {
      width: 130px; height: 130px; border-radius: 50%;
      border: 5px solid var(--color-gold);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 1.2rem auto;
    }
    .score-num {
      font-family: var(--font-display); font-size: 2.6rem;
      font-weight: 700; color: var(--color-primary); line-height: 1;
    }
    .score-sublabel { font-size: 0.75rem; font-weight: 800; color: var(--color-text-muted); text-transform: uppercase; }
    .score-msg { font-size: clamp(0.95rem, 2.2vw, 1.15rem); font-weight: 700; color: var(--color-text); text-align: center; }
    .restart-btn {
      background: none;
      border: 2.5px solid var(--color-primary);
      border-radius: 999px;
      padding: 0.75rem 2.2rem; color: var(--color-primary);
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease; margin-top: 1.4rem;
    }
    .restart-btn:hover { background: var(--color-primary); color: #fff; transform: translateY(-2px); }
  </style>
</head>
<body>

<!-- Rotating banner -->
<div class="top-banner">
  <div class="rotating-text" id="rotating-text">
    <span class="current" id="rt-current"></span>
    <span id="rt-next"></span>
  </div>
</div>

<!-- Bottom rotating banner -->
<div class="bottom-banner">
  <div class="rotating-text-bottom" id="rotating-text-bottom">
    <span class="current" id="rb-current"></span>
    <span id="rb-next"></span>
  </div>
</div>

<div class="slides-wrapper">

  <!-- SLIDE 0 : Intro -->
  <div class="slide" id="s0">
    <svg width="70" height="70" viewBox="0 0 80 80" fill="none" style="margin-bottom:1rem;opacity:0.8">
      <polygon points="40,4 47,28 72,28 52,44 60,70 40,55 20,70 28,44 8,28 33,28" fill="#d4a84b" opacity="0.75"/>
      <polygon points="40,16 45,32 62,32 49,42 54,58 40,49 26,58 31,42 18,32 35,32" fill="#c0392b" opacity="0.5"/>
    </svg>
    <h1 class="intro-title">قرآن وثقافة<br><span style="font-size:0.52em;color:var(--color-gold)">Quiz Arabesque</span></h1>
    <p class="intro-sub">4 questions sur la culture arabe et l'art islamique. Prêt(e) ?</p>
    <button class="start-btn" onclick="goTo(1)">بِسْمِ الله — Commencer !</button>
    <p class="ornament">﷽</p>
  </div>

  <!-- SLIDE 1 : Are u mad at me -->
  <div class="slide is-active" id="s1">
    <p class="question-text">Are u mad at me?</p>
    <div class="feedback" id="fb-1"></div>
    <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:1rem;width:min(420px,90vw);position:relative;min-height:60px;overflow:visible;z-index:20;" id="mad-row">
      <button class="answer-btn" id="btn-yes" onclick="handleMad(this)">Yes</button>
      <button class="answer-btn" id="btn-no" onclick="goTo(2)">No</button>
    </div>
  </div>

  <!-- SLIDE 2 : Dejaja -->
  <div class="slide" id="s2">
    <p class="question-text">Which arms do u want?</p>
    <div id="dejaja-display" style="display:flex;gap:1rem;justify-content:center;align-items:center;margin-bottom:1rem;min-height:220px;">
      <div id="dejaja-left-img" style="opacity:0;transform:scale(0.7);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);width:min(220px,44vw);aspect-ratio:1;border-radius:20px;overflow:hidden;border:3px solid var(--color-gold);box-shadow:var(--shadow-lg);">
        <img src="left.JPG" alt="Dejaja left" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      <div id="dejaja-right-img" style="opacity:0;transform:scale(0.7);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);width:min(220px,44vw);aspect-ratio:1;border-radius:20px;overflow:hidden;border:3px solid var(--color-gold);box-shadow:var(--shadow-lg);">
        <img src="right.JPG" alt="Dejaja right" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
    </div>
    <p id="dejaja-msg" style="font-size:clamp(0.95rem,2.2vw,1.1rem);font-weight:800;color:var(--color-primary);text-align:center;margin-bottom:0.8rem;opacity:0;transition:opacity 0.4s ease;">Excellent gourmet choice</p>
    <div class="answers-row" id="dejaja-row" style="flex-direction:column;gap:0.8rem;width:min(360px,88vw);">
      <div style="display:flex;gap:0.8rem;width:100%;">
        <button class="answer-btn" id="dejaja-btn-left" onclick="pickDejaja('left')" style="flex:1;font-size:clamp(1.05rem,3vw,1.25rem);padding:1rem 1.2rem;">🫲 Dejaja left</button>
        <button class="answer-btn" id="dejaja-btn-right" onclick="pickDejaja('right')" style="flex:1;font-size:clamp(1.05rem,3vw,1.25rem);padding:1rem 1.2rem;">🫱 Dejaja right</button>
      </div>
      <button class="answer-btn" id="dejaja-btn-both" onclick="pickDejaja('both')" style="display:none;font-size:clamp(1.1rem,3vw,1.3rem);padding:1rem 1.4rem;width:100%;">🍗 Both 🍗</button>
    </div>
    <button class="answer-btn" id="dejaja-next" onclick="goTo(3)" style="display:none;margin-top:0.8rem;border-color:var(--color-primary);color:var(--color-primary);flex:none;font-size:clamp(1.1rem,3vw,1.3rem);padding:1rem 2.4rem;">Khalass arms</button>
  </div>

  <!-- SLIDE 3 : Hug -->
  <div class="slide" id="s3">
    <p class="question-text">Laisse moi te prendre dans mes bras</p>
    <div class="answers-row" style="flex-direction:column;gap:0.8rem;width:min(360px,88vw);">
      <button class="answer-btn" data-q="3" data-v="correct" style="width:100%;font-size:clamp(1.1rem,3vw,1.3rem);padding:1rem 1.4rem;">Yeah babe</button>
      <button class="answer-btn" data-q="3" data-v="correct" style="width:100%;font-size:clamp(1.1rem,3vw,1.3rem);padding:1rem 1.4rem;">YES MY LORD</button>
    </div>
  </div>

  <!-- SLIDE 4 : Score -->
  <div class="slide" id="s4">
    <p style="font-family:var(--font-display);font-size:clamp(1.4rem,4vw,2rem);color:var(--color-gold);text-align:center;letter-spacing:0.05em;">النتيجة — Résultat</p>
    <div class="score-ring">
      <span class="score-num" id="score-display">0</span>
      <span class="score-sublabel">/ 10</span>
    </div>
    <p class="score-msg" id="score-msg"></p>
    <div class="photo-card" style="margin-top:1.2rem;">
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/4c0f2eb5e8050533b5d0b0be33be5e43fa045651.jpg"
           alt="Photo souvenir" width="380" height="380" loading="lazy">
    </div>
    <p class="ornament">مَا شَاءَ ٱللَّٰهُ</p>
  </div>

</div>

<script>
  // ── Rotating text (top) ──
  const phrases = [
    "Respecte la signification de ton prénom",
    "Respect your name meaning",
    "احترم معنى اسمك",
    "Уважай значение своего имени"
  ];
  let phraseIndex = 0;
  const rtA = document.getElementById("rt-current");
  const rtB = document.getElementById("rt-next");
  let rtUseA = true;

  rtA.textContent = phrases[0];
  rtA.classList.add("visible");

  function rotateBanner() {
    const nextIndex = (phraseIndex + 1) % phrases.length;
    const outEl = rtUseA ? rtA : rtB;
    const inEl  = rtUseA ? rtB : rtA;
    // Prepare incoming below
    inEl.classList.remove("visible", "exit-up");
    inEl.textContent = phrases[nextIndex];
    // Force reflow
    void inEl.offsetWidth;
    // Animate out current, animate in next
    outEl.classList.remove("visible");
    outEl.classList.add("exit-up");
    inEl.classList.add("visible");
    rtUseA = !rtUseA;
    phraseIndex = nextIndex;
  }
  setInterval(rotateBanner, 3000);

  // ── Rotating text (bottom) ──
  const bottomPhrases = [
    "I miss you",
    "Tu me manques",
    "أشتاق إليك",
    "Я скучаю по тебе"
  ];
  let bottomIndex = 0;
  const rbA = document.getElementById("rb-current");
  const rbB = document.getElementById("rb-next");
  let rbUseA = true;

  rbA.textContent = bottomPhrases[0];
  rbA.classList.add("visible");

  function rotateBottom() {
    const nextIndex = (bottomIndex + 1) % bottomPhrases.length;
    const outEl = rbUseA ? rbA : rbB;
    const inEl  = rbUseA ? rbB : rbA;
    inEl.classList.remove("visible", "exit-up");
    inEl.textContent = bottomPhrases[nextIndex];
    void inEl.offsetWidth;
    outEl.classList.remove("visible");
    outEl.classList.add("exit-up");
    inEl.classList.add("visible");
    rbUseA = !rbUseA;
    bottomIndex = nextIndex;
  }
  setInterval(rotateBottom, 3000);

  // ── Slides ──
  const TOTAL = 5;
  let current = 1;
  let isAnimating = false;
  const answered = {};

  // ── Mad at me logic ──
  let madClicks = 0;
  function handleMad(yesBtn) {
    madClicks++;
    const noBtn = document.getElementById("btn-no");
    const madRow = document.getElementById("mad-row");
    // No grows progressively over 8 clicks
    const noSteps = [
      { fs: "1.2rem",  pad: "0.8rem 1.3rem" },
      { fs: "1.5rem",  pad: "1rem 1.6rem" },
      { fs: "2rem",    pad: "1.2rem 2rem" },
      { fs: "2.6rem",  pad: "1.4rem 2.5rem" },
      { fs: "3.2rem",  pad: "1.6rem 3rem" },
      { fs: "3.8rem",  pad: "1.8rem 3.5rem" },
      { fs: "4.5rem",  pad: "2rem 4rem" },
      { fs: "5.5rem",  pad: "2.2rem 4.5rem" },
    ];
    // Yes shrinks but stays clickable until step 8
    const yesSteps = [
      { fs: "0.85rem", pad: "0.55rem 0.7rem", op: 0.9 },
      { fs: "0.78rem", pad: "0.5rem 0.6rem",  op: 0.8 },
      { fs: "0.7rem",  pad: "0.45rem 0.55rem", op: 0.7 },
      { fs: "0.62rem", pad: "0.4rem 0.5rem",  op: 0.55 },
      { fs: "0.55rem", pad: "0.35rem 0.45rem", op: 0.4 },
      { fs: "0.48rem", pad: "0.3rem 0.4rem",  op: 0.28 },
      { fs: "0.4rem",  pad: "0.25rem 0.35rem", op: 0.15 },
      { fs: "0.3rem",  pad: "0.2rem 0.25rem", op: 0.05 },
    ];
    const idx = Math.min(madClicks - 1, noSteps.length - 1);
    noBtn.style.fontSize = noSteps[idx].fs;
    noBtn.style.padding = noSteps[idx].pad;
    noBtn.style.transition = "font-size 0.35s cubic-bezier(0.16,1,0.3,1), padding 0.35s cubic-bezier(0.16,1,0.3,1)";
    yesBtn.style.fontSize = yesSteps[idx].fs;
    yesBtn.style.padding = yesSteps[idx].pad;
    yesBtn.style.opacity = yesSteps[idx].op;
    yesBtn.style.transition = "font-size 0.3s ease, padding 0.3s ease, opacity 0.3s ease";
    // Only at the very end: disable Yes, pulse No
    if (madClicks >= noSteps.length) {
      yesBtn.disabled = true;
      yesBtn.style.pointerEvents = "none";
      noBtn.style.animation = "pulse 0.5s ease 3";
    }
  }

  // ── Dejaja logic ──
  let dejajaPicked = { left: false, right: false };
  function pickDejaja(choice) {
    const leftImg = document.getElementById("dejaja-left-img");
    const rightImg = document.getElementById("dejaja-right-img");
    const bothBtn = document.getElementById("dejaja-btn-both");
    const msg = document.getElementById("dejaja-msg");
    const btnLeft = document.getElementById("dejaja-btn-left");
    const btnRight = document.getElementById("dejaja-btn-right");

    if (choice === "left") {
      dejajaPicked.left = true;
      leftImg.style.opacity = "1";
      leftImg.style.transform = "scale(1)";
      btnLeft.classList.add("correct");
    } else if (choice === "right") {
      dejajaPicked.right = true;
      rightImg.style.opacity = "1";
      rightImg.style.transform = "scale(1)";
      btnRight.classList.add("correct");
    } else if (choice === "both") {
      dejajaPicked.left = true;
      dejajaPicked.right = true;
      leftImg.style.opacity = "1";
      leftImg.style.transform = "scale(1)";
      rightImg.style.opacity = "1";
      rightImg.style.transform = "scale(1)";
      btnLeft.classList.add("correct");
      btnRight.classList.add("correct");
      bothBtn.classList.add("correct");
    }

    // Show Both button once at least one side is picked
    if (dejajaPicked.left || dejajaPicked.right) {
      bothBtn.style.display = "";
    }

    // Once both are picked → show message + khalass button, hide others
    if (dejajaPicked.left && dejajaPicked.right) {
      msg.style.opacity = "1";
      btnLeft.style.display = "none";
      btnRight.style.display = "none";
      bothBtn.style.display = "none";
      document.getElementById("dejaja-row").style.display = "none";
      answered["2"] = "correct";
      const nextBtn = document.getElementById("dejaja-next");
      nextBtn.style.display = "";
    }
  }

  function goTo(next) {
    if (next === current || isAnimating || next < 0 || next >= TOTAL) return;
    isAnimating = true;
    const fromEl = document.getElementById("s" + current);
    const toEl   = document.getElementById("s" + next);
    const goingRight = next > current;

    toEl.style.visibility = "visible";
    fromEl.classList.remove("is-active");
    fromEl.classList.add(goingRight ? "exit-to-left" : "exit-to-right");
    toEl.classList.add(goingRight ? "enter-from-right" : "enter-from-left");
    toEl.classList.add("is-active");

    setTimeout(() => {
      fromEl.classList.remove("exit-to-left", "exit-to-right");
      fromEl.style.visibility = "";
      toEl.classList.remove("enter-from-right", "enter-from-left");
      current = next;
      isAnimating = false;
      if (current === TOTAL - 1) renderScore();
    }, 520);
  }

  // Answer handling
  document.querySelectorAll(".answer-btn[data-q]").forEach(btn => {
    btn.addEventListener("click", function() {
      const q = this.dataset.q;
      if (answered[q]) return;
      answered[q] = this.dataset.v;

      const allBtns = document.querySelectorAll(".answer-btn[data-q='" + q + "']");
      allBtns.forEach(b => {
        b.disabled = true;
        if (b.dataset.v === "correct") b.classList.add("correct");
        else if (b === this && this.dataset.v === "wrong") b.classList.add("wrong");
      });

      goTo(parseInt(q) + 1);
    });
  });

  function renderScore() {
    document.getElementById("score-display").textContent = "3";
    document.getElementById("score-msg").innerHTML = "You\'re a 3/10... I guess we\'ll have to fix that the 7th of May<br><span style=\"font-family:var(--font-display);font-size:clamp(1.3rem,3.5vw,1.8rem);color:var(--color-gold);display:block;text-align:center;margin-top:1rem;\">Happy Birthday ma Hanan</span>";
  }

  function restart() {
    Object.keys(answered).forEach(k => delete answered[k]);
    document.querySelectorAll(".answer-btn").forEach(b => {
      b.disabled = false; b.classList.remove("correct","wrong");
    });
    for (let i = 1; i <= 4; i++) {
      const fb = document.getElementById("fb-" + i);
      if (fb) { fb.className = "feedback"; fb.textContent = ""; }
    }
    for (let i = 1; i < TOTAL; i++) {
      const el = document.getElementById("s" + i);
      el.classList.remove("is-active","enter-from-right","enter-from-left","exit-to-left","exit-to-right");
      el.style.visibility = "";
    }
    document.getElementById("s1").classList.add("is-active");
    madClicks = 0;
    const yBtn = document.getElementById("btn-yes");
    const nBtn = document.getElementById("btn-no");
    if (yBtn) { yBtn.disabled=false; yBtn.style.opacity="1"; yBtn.style.fontSize=""; yBtn.style.padding=""; yBtn.style.pointerEvents=""; yBtn.style.transition=""; }
    if (nBtn) { nBtn.style.fontSize=""; nBtn.style.padding=""; nBtn.style.animation=""; nBtn.style.transition=""; }
    // Reset dejaja
    dejajaPicked = { left: false, right: false };
    const dli = document.getElementById("dejaja-left-img");
    const dri = document.getElementById("dejaja-right-img");
    const dm = document.getElementById("dejaja-msg");
    const db = document.getElementById("dejaja-btn-both");
    if (dli) { dli.style.opacity = "0"; dli.style.transform = "scale(0.7)"; }
    if (dri) { dri.style.opacity = "0"; dri.style.transform = "scale(0.7)"; }
    if (dm) { dm.style.opacity = "0"; }
    if (db) { db.style.display = "none"; }
    const dl = document.getElementById("dejaja-btn-left");
    const dr = document.getElementById("dejaja-btn-right");
    const drow = document.getElementById("dejaja-row");
    if (dl) { dl.style.display = ""; dl.disabled = false; dl.classList.remove("correct"); }
    if (dr) { dr.style.display = ""; dr.disabled = false; dr.classList.remove("correct"); }
    if (db) { db.disabled = false; db.classList.remove("correct"); }
    if (drow) { drow.style.display = ""; }
    const dn = document.getElementById("dejaja-next");
    if (dn) { dn.style.display = "none"; }
    isAnimating = false;
    current = 1;
  }
</script>
</body>
</html>
